paths:
  raw_pdf_dir: sandbox/data/01_raw_pdf
  markdown_vault_dir: sandbox/data/02_markdown_vault
  markdown_assets_dir: sandbox/data/02_markdown_vault/assets
  chroma_db_dir: sandbox/data/03_chroma_db

markdown:
  vault_filename_pattern: "{doc_id}.md"
  frontmatter_version: "v1"

chunking:
  target_chars: 1000
  overlap_chars: 150
  # 沙盒 demo 文本较短，降低最小切块长度以便入库验证
  min_chunk_chars: 20
  # 防止“引文污染”：References/参考文献段不进入向量/FTS
  exclude_reference_sections: true
  # 扩展的 references 分界标题集合（忽略大小写；#~###）
  reference_section_titles:
    - References
    - Reference
    - Bibliography
    - Works Cited
    - Literature
    - Literature Cited
    - 参考文献
    - 引用文献
    - 参考资料

embedding:
  # 与正式环境保持一致；仅数据路径不同
  model_name_or_path: "D:/Models/bge-m3"
  device: "cuda"
  batch_size: 16
  normalize_embeddings: true

chroma:
  collection_name: "knotliedge_v1_sandbox"
  http_host: "localhost"
  # 与正式配置端口错开，便于同时起两套 Chroma 守护进程（本机检测无监听）
  http_port: 45219

openalex:
  # Polite Pool: all OpenAlex requests should include this mailto.
  mailto: "you@example.com"
  # Optional (can be empty): if you have an OpenAlex API key, put it here.
  api_key:

ieee_xplore:
  min_interval_s: 60
  user_agent: "KnotLiEdge/0.1 (+mailto:you@example.com) ieee-xplore-fetch"
  trust_env_for_proxy: false
  max_retries: 4
  backoff_base_s: 5

venue_radar:
  # Only fetch works published within past N days.
  lookback_days: 300
  # OpenAlex Source IDs to track (journals / conferences).
  # Preferred format: https://openalex.org/S...
  # Also accepted: S...
  #
  # Suggested venues (names): TED, MTT, MWTL, EDL, ISSCC, RFIC, IMS, IEDM, JSSC, TCAS-I, TCAS-II
  target_venues:
    # EDA / ML for chip design
    - "https://openalex.org/S4306418182"   # DAC: Design Automation Conference
    - "https://openalex.org/S4306419226"   # ICCAD: International Conference on Computer Aided Design
    - "https://openalex.org/S4306418181"   # DATE: Design, Automation, and Test in Europe
    - "https://openalex.org/S4306420609"   # NeurIPS: Neural Information Processing Systems

    - "https://openalex.org/S162355128"   # TED: IEEE Transactions on Electron Devices
    - "https://openalex.org/S198879913"   # MTT: IEEE Transactions on Microwave Theory and Techniques
    - "https://openalex.org/S4387280707"  # MWTL: IEEE Microwave and Wireless Technology Letters
    - "https://openalex.org/S19887683"    # EDL: IEEE Electron Device Letters
    - "https://openalex.org/S4363607897"  # ISSCC: IEEE International Solid-State Circuits Conference
    - "https://openalex.org/S4210202669"  # RFIC: IEEE Radio Frequency Integrated Circuits Symposium
    - "https://openalex.org/S4210185519"  # IMS: IEEE MTT-S International Microwave Symposium
    - "https://openalex.org/S4363605375"  # IEDM: IEEE International Electron Devices Meeting
    - "https://openalex.org/S83637746"    # JSSC: IEEE Journal of Solid-State Circuits
    - "https://openalex.org/S116977442"   # TCAS-I: IEEE Transactions on Circuits and Systems I: Regular Papers
    - "https://openalex.org/S93916849"    # TCAS-II: IEEE Transactions on Circuits and Systems II: Express Briefs
