paths:
  raw_pdf_dir: sandbox/data/01_raw_pdf_ieee_one
  markdown_vault_dir: sandbox/data/02_markdown_vault_ieee_one
  markdown_assets_dir: sandbox/data/02_markdown_vault_ieee_one/assets
  chroma_db_dir: sandbox/data/03_chroma_db

markdown:
  vault_filename_pattern: "{doc_id}.md"
  frontmatter_version: "v1"

chunking:
  target_chars: 1000
  overlap_chars: 150
  min_chunk_chars: 20
  exclude_reference_sections: true
  reference_section_titles:
    - References
    - Reference
    - Bibliography
    - Works Cited
    - Literature
    - Literature Cited
    - 参考文献
    - 引用文献
    - 参考资料

embedding:
  model_name_or_path: "D:/Models/bge-m3"
  device: "cuda"
  batch_size: 16
  normalize_embeddings: true

chroma:
  collection_name: "knotliedge_v1_sandbox"
  http_host: "localhost"
  http_port: 45219

openalex:
  mailto: "you@example.com"
  api_key:

ieee_xplore:
  min_interval_s: 60
  user_agent: "KnotLiEdge/0.1 (+mailto:you@example.com) ieee-xplore-fetch"
  trust_env_for_proxy: false
  max_retries: 4
  backoff_base_s: 5

venue_radar:
  lookback_days: 300
  target_venues: []

